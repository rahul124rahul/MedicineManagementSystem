{% extends "layout.html" %}
{% block content %}

<div class="card smooth-card">
    <h2>Edit Patient</h2>

    <form method="POST">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ patient.name }}" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" value="{{ patient.age }}" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <input type="text" name="gender" value="{{ patient.gender }}" required>
        </div>

        <button type="submit" class="btn-primary">Update Patient</button>
        <a href="/patients" class="btn-secondary">Cancel</a>
    </form>
</div>

{% endblock %}
