{% extends "layout.html" %}
{% block content %}

<h2>Add Medicine</h2>

<form method="POST" action="/add_medicine" class="form-card">

    <input type="text" name="name" placeholder="Medicine Name" required>
    <input type="text" name="description" placeholder="Description">

    <label>Assign to Patient (Optional)</label>
    <select name="patient_id">
        <option value="">-- Select Patient --</option>
        {% for patient in patients %}
        <option value="{{ patient.id }}">{{ patient.name }}</option>
        {% endfor %}
    </select>

    <button type="submit" class="btn">Add Medicine</button>
</form>

<hr>

<h2>Medicine List</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
        <th>Patient</th>
    </tr>

    {% for med in medicines %}
    <tr>
        <td>{{ med.id }}</td>
        <td>{{ med.name }}</td>
        <td>{{ med.description }}</td>
        <td>
            {% if med.patient %}
                {{ med.patient.name }}
            {% else %}
                Not Assigned
            {% endif %}
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
